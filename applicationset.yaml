apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: default
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/nt114thenttthytlu/gitops-for-microservices-demo.git
      revision: main
      directories:
      - path: "*service"
      - path: frontend

  template:
    metadata:
      name: "{{path.basename}}"

    spec:
      project: default

      source:
        repoURL: https://github.com/nt114thenttthytlu/gitops-for-microservices-demo.git
        targetRevision: main
        path: "{{path}}"

      destination:
        server: https://kubernetes.default.svc
        namespace: default

      syncPolicy:
        automated:
          prune: true
          selfHeal: true