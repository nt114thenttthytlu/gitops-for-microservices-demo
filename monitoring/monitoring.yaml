apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts

    chart: kube-prometheus-stack

    targetRevision: 69.3.1
    helm:
      values: |

        prometheus:
          prometheusSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: "gp3"
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
          service:
            type: LoadBalancer


        grafana:
          initChownData:
            enabled: false
          
          podSecurityContext:
            fsGroup: 472
            runAsGroup: 472
            runAsUser: 472

          persistence:
            enabled: true
            size: 5Gi
            storageClassName: "gp3"

          service:
            type: LoadBalancer


        alertmanager:
          service:
            type: LoadBalancer

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
